<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <table style="width: 100%">
      <script>
        const cores = ["red", "green", "blue"];

        for (let i = 0; i <= 10; i++) {
          document.write("<tr>");

          for (let j = 0; j <= 10; j++) {
            let pos = Math.trunc(Math.random() * 3);
            document.write(
              `<td style= "background-color: ${cores[pos]}; height: 20px;">&nbsp;</td>`,
            );
          }
          document.write("</tr>");
        }
      </script>
    </table>
  </body>
</html>
